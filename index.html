.sp.on{background:#1a73e8;color:#fff;}
#zbx{position:absolute;right:12px;bottom:130px;z-index:20;display:flex;flex-direction:column;gap:1px;}
.zb{width:36px;height:36px;background:#fff;border:none;cursor:pointer;font-size:18px;color:#444;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.zb:first-child{border-radius:4px 4px 0 0;}.zb:last-child{border-radius:0 0 4px 4px;}
#playbtn{position:absolute;right:12px;bottom:80px;z-index:20;width:42px;height:42px;background:#1a73e8;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 2px 6px rgba(0,0,0,0.25);}

.legdot{width:10px;height:10px;border-radius:50%;}
.legline{width:18px;height:4px;border-radius:2px;background:#e53935;}
#eta{position:absolute;bottom:12px;left:12px;right:60px;z-index:20;background:#fff;border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.18);}

const canvas=document.getElementById('c');

const wrap=document.getElementById('wrap');
let W,H;

let camDay=TODAY_DAY, playing=false, speed=3, lastTs=null, pulse=0, zoom=1;
const PPD=90;

// weekOfDay: numéro de semaine française (continu) correspondant à un jour donné
function weekOfDay(day){
  const jsDay=(TODAY_DOW+Math.round(day))%7;
  const frDay=(jsDay+6)%7;
  return (Math.round(day)-frDay)/7;
}
// viewCenterWeek = semaine actuellement centrée à l'écran.
// Séparée de camDay: le scroll tactile ne modifie QUE viewCenterWeek,
// le bonhomme (camDay) ne bouge qu'avec les flèches / lecture auto.
let viewCenterWeek = weekOfDay(TODAY_DAY);

function resize(){ const r=wrap.getBoundingClientRect(); W=canvas.width=r.width; H=canvas.height=r.height; }

// === ZIGZAG GEOMETRY ===
function laneH(){ return roadHW()*2.8; }
function margin(){ return Math.max(35,W*0.07); }
function roadHW(){ return Math.max(22,Math.min(70,W*0.09))*zoom; }

// Convert absolute day → screen {x, y}
// Nombre de lanes visibles simultanément
function lanesPerScreen(){ return Math.max(3, Math.floor((H*0.82) / laneH())); }


function getCamWeek(){
  // Semaine centrée à l'écran (vue), utilisée pour les bornes de boucle
  return Math.floor(viewCenterWeek);
}
function dayToScreen(day){
  const lh=laneH(), mg=margin(), rw=W-2*mg;
  const jsDay=(TODAY_DOW+day)%7;
  const frDay=(jsDay+6)%7; // 0=Lu...6=Di
  const weekNum=Math.floor((day-frDay)/7);
  const x=mg+(frDay+0.5)/7*rw;
  // viewCenterWeek (continu, non arrondi) permet un scroll fluide au pixel
  const y=H*0.65-(weekNum-viewCenterWeek)*lh;
  return{x,y,lane:weekNum,dir:1,hw:roadHW()};
}

function carScreen(){
  return dayToScreen(camDay);
}

// Returns screen pos for camDay (the car)
function carScreen(){
  const{x,y}=dayToScreen(camDay);
  return{x,y};
}

// Edge positions at a given day
function edgesAt(day){
  const{x,y,hw}=dayToScreen(day);
  return{left:x-hw,right:x+hw,hw,x,y};
}

// Is a screen y within visible area?
function visible(y){ return y>-60&&y<H+60; }

function isSat(d){ return((TODAY_DOW+d)%7)===6; }
function isSun(d){ return((TODAY_DOW+d)%7)===0; }
function isMonday(d){ return((TODAY_DOW+d)%7)===1; }

function shortDate(d){
  const ms=new Date('2023-01-01T00:00:00Z').getTime()+d*86400000;
  const dt=new Date(ms);
  return dt.getDate()+' '+dt.toLocaleString('fr-FR',{month:'short'})+' '+dt.getUTCFullYear();
}

function draw(ts){
  if(!lastTs)lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.1); lastTs=ts; pulse+=dt*2.5;
  if(playing){
    camDay=Math.min(TOTAL_DAYS,camDay+dt*speed);
    viewCenterWeek=weekOfDay(camDay);
  }
  ctx.clearRect(0,0,W,H);

  drawBackground();
  drawAllLanes();
  drawDayMarks();
  drawVacanceBands();
  drawWeekendZones();
  drawJoursFeriesBands();
  drawMultiEventBands();
  drawEventBars();
  drawEventTexts();
  drawDayDates();
  drawDayLetters();
  drawMonthLabels();
  drawTodayMark();
  drawPerson();
  updateScrollbar();
  requestAnimationFrame(draw);
}

function drawBackground(){
  // Full background: lighter color shows lanes clearly
  ctx.fillStyle='#c8dba8';
  ctx.fillRect(0,0,W,H);
  // Subtle horizontal lines between lanes
  const lh=laneH(), hw=roadHW();
  const camLane=getCamWeek();
  const carY=H*0.82;
  const lps2=lanesPerScreen(),personLane2=getCamWeek(),batchStart2=personLane2-(personLane2%lps2);
  for(let ln=batchStart2-1;ln<=batchStart2+lps2+1;ln++){
    const y=carY-(ln-camLane)*lh;
    if(y<-20||y>H+20) continue;
    // grass band between lanes
    ctx.fillStyle=(ln%2===0)?'#b8d485':'#c0dc90';
    ctx.fillRect(0,y-lh/2,W,lh);
    ctx.fillStyle='transparent';
  }
  // Sky hint at very top
  const skyH=Math.min(60,H*0.10);
  ctx.fillStyle='#87ceeb';
  ctx.fillRect(0,0,W,skyH);
}

function drawAllLanes(){
  const mg=margin(), rw=W-2*mg, lh=laneH(), hw=roadHW();
  const camWeek2=getCamWeek();
  const _vl=Math.ceil(H/lh)+4;
  const dayW=rw/7;

  for(let ln=camWeek2-_vl; ln<=camWeek2+_vl; ln++){
    if(ln<0) continue;
    const y=H*0.65-(ln-camWeek2)*lh;
    if(!visible(y)) continue;

    // === BANDE HORIZONTALE : 7 cases égales ===
    // Fond de toute la bande
    ctx.fillStyle='#d4d8de';
    ctx.fillRect(mg, y-hw, rw, hw*2);

    // Bordure haute et basse
    ctx.strokeStyle='#5a6070'; ctx.lineWidth=Math.max(2,hw*0.12); ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(mg,y-hw);ctx.lineTo(mg+rw,y-hw);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mg,y+hw);ctx.lineTo(mg+rw,y+hw);ctx.stroke();

    // Séparateurs verticaux entre les 7 jours
    ctx.strokeStyle='rgba(0,0,0,0.20)'; ctx.lineWidth=1;
    for(let d=1;d<7;d++){
      const dx=mg+d*dayW;
      ctx.beginPath();ctx.moveTo(dx,y-hw);ctx.lineTo(dx,y+hw);ctx.stroke();
    }

    // Bordure gauche et droite
    ctx.strokeStyle='#5a6070'; ctx.lineWidth=Math.max(2,hw*0.12);
    ctx.beginPath();ctx.moveTo(mg,y-hw);ctx.lineTo(mg,y+hw);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mg+rw,y-hw);ctx.lineTo(mg+rw,y+hw);ctx.stroke();

    // Highlight semaine courante
    if(ln===camWeek2){
      ctx.fillStyle='rgba(251,191,36,0.08)';
      ctx.fillRect(mg,y-hw,rw,hw*2);
    }

    // === TRAIT Di→Lu (connexion entre semaines) ===
    // Di est à droite (x=mg+rw-dayW/2), Lu est à gauche (x=mg+dayW/2) de la semaine du dessus
    const nextY=H*0.65-(ln+1-camWeek2)*lh;
    if(visible(nextY)||visible(y)){
      const xDi=mg+rw-dayW*0.5;  // centre Di (dernier jour)
      const xLu=mg+dayW*0.5;      // centre Lu (premier jour semaine suivante)
      ctx.strokeStyle='rgba(80,80,80,0.45)';
      ctx.lineWidth=Math.max(1.5,hw*0.08);
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(xDi, y-hw); // haut de Di
      // Courbe vers Lu de la semaine suivante
      ctx.bezierCurveTo(
        xDi, y-hw-lh*0.4,   // point contrôle 1 (monte à droite)
        xLu, nextY+hw+lh*0.4, // point contrôle 2 (descend à gauche)
        xLu, nextY+hw         // arrivée Lu (bas de la semaine suivante)
      );
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

    if(!visible(y)) return;
    if(hw<14) return;

    const fs=Math.max(7,Math.min(15,hw*0.30));
    const lineH=Math.max(fs*1.2,fs+3);
    const allEvts=[...evts.filter(e=>e.side==='left'),...evts.filter(e=>e.side==='right')];
    if(!allEvts.length) return;

    ctx.font=`bold ${fs}px Arial`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';

    let ty=y-hw+fs*0.8;
    allEvts.forEach(ev=>{
      if(ty>y+hw-fs*0.5) return;
      const isJF=ev.side==='right';
      const baseColor=isJF?'#001a66':'#004400';
      const color=isLieVacanceGlobal(ev.title)?'#e65100':baseColor;
      // Découper le titre en mots et les afficher un par un
      const words=ev.title.split(' ');
      // Pour JF: calculer d'abord la hauteur du bloc pour dessiner le cadre
      if(isJF && words.length>0){
        const blockH=words.length*lineH-lineH*0.2;
        const maxW=Math.max(...words.map(w=>ctx.measureText(w).width))+6;
        const frameY=ty-fs*0.6;
        if(frameY+blockH<=y+hw){
          ctx.strokeStyle='rgba(0,0,0,0.55)';
          ctx.lineWidth=1;
          ctx.setLineDash([]);
          ctx.strokeRect(x-maxW/2-2, frameY, maxW+4, blockH);
        }
      }
      words.forEach(word=>{
        if(!word) return;
        if(ty>y+hw-fs*0.5) return;
        ctx.fillStyle='rgba(255,255,255,0.65)';
        ctx.fillText(word,x+0.7,ty+0.7);
        ctx.fillStyle=color;
        ctx.fillText(word,x,ty);
        ty+=lineH;
      });
      ty+=lineH*0.3;
    });
  });
}

function drawMonthLabels(){
  // Affiche mois + année au centre de la bande verte entre les lanes
  // Positionné entre deux lanes consécutives
  const lh=laneH(), mg=margin();
  const ORIGIN_MS=new Date('2023-01-01T00:00:00Z').getTime();
  const camLane=getCamWeek();
  const _vl=Math.ceil(H/lh)+4;
  const lps=lanesPerScreen();
  const batchStart=camLane-(camLane%lps);

  let lastMonth=-1;

  for(let ln=batchStart-_vl; ln<=batchStart+lps+_vl; ln++){
    if(ln<0) continue;
    // First day of this lane
    const firstDay=ln*7;
    if(firstDay>TOTAL_DAYS) continue;

    const dt=new Date(ORIGIN_MS+firstDay*86400000);
    const month=dt.getUTCMonth();
    const year=dt.getUTCFullYear();
    if(month===lastMonth) continue;
    lastMonth=month;

    // Position: midpoint between lane ln-1 and lane ln (in the green band)
    const{y:y1}=dayToScreen(ln*7);       // top of current lane
    const{y:y0}=dayToScreen((ln-1)*7);   // top of previous lane
    if(!visible(y1)&&!visible(y0)) continue;

    const yMid=(y0+y1)/2; // center of green gap between lanes
    if(!visible(yMid)) continue;

    const mois=dt.toLocaleDateString('fr-FR',{month:'long'});
    const label=mois.charAt(0).toUpperCase()+mois.slice(1)+' '+year;

    const fs=Math.max(10,Math.min(16,lh*0.28));
    ctx.font=`bold ${fs}px Arial`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    // Légère ombre
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillText(label, W/2+1, yMid+1);
    ctx.fillStyle='#2d4a1e';
    ctx.fillText(label, W/2, yMid);
  }
}

function drawDayDates(){
  // Affiche la date complète dans la case du dimanche, sur 3 lignes
  const hw=roadHW();
  const ORIGIN_MS=new Date('2023-01-01T00:00:00Z').getTime();
  const camLane=getCamWeek();
  const _vl=Math.ceil(H/laneH())+5;
   for(let d=Math.max(0,Math.floor((camLane-_vl)*7));
         d<=Math.min(TOTAL_DAYS,Math.ceil((camLane+_vl)*7));d++){
    if(!isSun(d)) continue; // seulement les dimanches
    const{x,y}=dayToScreen(d);
    if(!visible(y)) continue;
    if(hw<12) continue;

    const dt=new Date(ORIGIN_MS+d*86400000);
    const dayNum=dt.getDate();
    const mon=dt.toLocaleDateString('fr-FR',{month:'long'});
    const year=dt.getUTCFullYear();

    const fs=Math.max(7,Math.min(12,hw*0.24));
    const lineH=fs*1.3;
    // 3 lignes centrées dans la case
    const lines=['Dimanche', dayNum+' '+mon, String(year)];
    const totalH=(lines.length-1)*lineH;
    const startY=y-totalH/2;

    ctx.textAlign='center'; ctx.textBaseline='middle';
    lines.forEach((line,i)=>{
      const ty=startY+i*lineH;
      ctx.font=i===0?`bold ${fs}px Arial`:`${fs}px Arial`;
      ctx.fillStyle='rgba(255,255,255,0.75)';
      ctx.fillText(line,x+1,ty+1);
      ctx.fillStyle='#1b5e20';
      ctx.fillText(line,x,ty);
    });
  }
}


function drawDayLetters(){
  const hw=roadHW();
  const ORIGIN_MS=new Date('2023-01-01T00:00:00Z').getTime();
  const camLane=getCamWeek();
  const _vl=Math.ceil(H/laneH())+3;
  const LABELS=['Di','Lu','Ma','Me','Je','Ve','Sa'];
  const LEISURE_KW=['randon','voyage','vacance','séjour','sejour','trek','ski',
    'montagne','plage','mer','camp','avignon','festival','tropez','bdo',
    'noah','arthur','célia','celia','tangue','alpe','sarl','privas','châlons',
    'chalons','dieulefit','gordes','sicile','lucille','william','balcon','vaujany',
    'stay','bar des amis','sophie','paques','toussaint','ascension'];

  // Build leisure days map
  const leisureByDay={};
  MULTI_EVENTS.forEach(ev=>{
    const t=ev.title.toLowerCase();
    if(LEISURE_KW.some(k=>t.includes(k))){
      for(let d=ev.day1;d<=ev.day2;d++) leisureByDay[d]=ev.title;
    }
  });

   for(let d=Math.max(0,Math.floor((camLane-_vl)*7));
         d<=Math.min(TOTAL_DAYS,Math.ceil((camLane+_vl)*7));d++){
    const{x,y}=dayToScreen(d);
    if(!visible(y)) continue;
    if(hw<12) continue;

    const jsDay=(TODAY_DOW+d)%7;
    const lbl=LABELS[jsDay];
    const isSat2=jsDay===6, isSun2=jsDay===0;
    const isWE=isSat2||isSun2;

    const fs=Math.max(7,Math.min(11,hw*0.22));
    const ty=y+hw*0.68;
    const color=isWE?'#1b5e20':'#000000';

    // Jour (2 lettres) à gauche de x
    ctx.font=`${isWE?'bold ':' '}${fs}px Arial`;
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.fillText(lbl, x-2+0.7, ty+0.7);
    ctx.fillStyle=color;
    ctx.fillText(lbl, x-2, ty);

    // Numéro du jour à droite de x
    const dt2=new Date(ORIGIN_MS+d*86400000);
    const dayNum=dt2.getDate();
    ctx.font=`${isWE?'bold ':' '}${fs}px Arial`;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.fillText(dayNum, x+2+0.7, ty+0.7);
    ctx.fillStyle=color;
    ctx.fillText(dayNum, x+2, ty);

    // Nom événement loisir en petit EN DESSOUS du numéro
    if(leisureByDay[d] && hw>18){
      const evTitle=leisureByDay[d].slice(0,12);
      const fsSmall=Math.max(6,Math.min(9,hw*0.16));
      ctx.font=`${fsSmall}px Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const tyLeisure=ty+fs*1.2; // en dessous de la date
      ctx.fillStyle='rgba(255,255,255,0.70)';
      ctx.fillText(evTitle, x+0.6, tyLeisure+0.6);
      ctx.fillStyle='#e65100';
      ctx.fillText(evTitle, x, tyLeisure);
    }
  }
}


function drawTodayMark(){
  const{x,y}=dayToScreen(TODAY_DAY);
  if(!visible(y)) return;
  const hw=roadHW();
  ctx.strokeStyle='#1a73e8'; ctx.lineWidth=Math.max(2,hw*0.07); ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(x,y-hw);ctx.lineTo(x,y+hw);ctx.stroke();
  ctx.setLineDash([]);
  const fs=Math.max(8,Math.min(10,hw*0.25));
  ctx.font=`bold ${fs}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillStyle='#333';
  ctx.fillText("Aujourd'hui",x,y-hw-2);
}

function drawPerson(){
  const{x:cx,y:cy}=carScreen();
  const s=Math.max(20,Math.min(50,roadHW()*1.2));
  const swing=playing?Math.sin(pulse*2.2)*0.42:0;
  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.setLineDash([]);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.beginPath();ctx.ellipse(cx+s*0.04,cy+s*0.06,s*0.22,s*0.07,0,0,Math.PI*2);ctx.fill();

  // Legs
  const llx=cx-s*0.11-s*0.06*Math.sin(swing), lly=cy+s*0.55+s*0.10*Math.sin(swing);
  ctx.strokeStyle='#1a3a7a'; ctx.lineWidth=s*0.14;
  ctx.beginPath();ctx.moveTo(cx-s*0.07,cy-s*0.06);
  ctx.quadraticCurveTo(cx-s*0.12,cy+s*0.28,llx,lly);ctx.stroke();
  const rlx=cx+s*0.11+s*0.06*Math.sin(swing), rly=cy+s*0.55-s*0.10*Math.sin(swing);
  ctx.beginPath();ctx.moveTo(cx+s*0.07,cy-s*0.06);
  ctx.quadraticCurveTo(cx+s*0.12,cy+s*0.28,rlx,rly);ctx.stroke();

  // Shoes
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(llx,lly+s*0.04,s*0.10,s*0.05,-swing*0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(rlx,rly+s*0.04,s*0.10,s*0.05,swing*0.3,0,Math.PI*2);ctx.fill();

  // Jean
  ctx.strokeStyle='#2a4a7a'; ctx.lineWidth=s*0.13;
  ctx.beginPath();ctx.moveTo(cx-s*0.09,cy+s*0.12);
  ctx.quadraticCurveTo(cx-s*0.12,cy+s*0.35,llx,lly);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+s*0.09,cy+s*0.12);
  ctx.quadraticCurveTo(cx+s*0.12,cy+s*0.35,rlx,rly);ctx.stroke();

  // Hip
  ctx.fillStyle='#2a4a7a';
  ctx.beginPath();ctx.ellipse(cx,cy+s*0.02,s*0.18,s*0.10,0,0,Math.PI*2);ctx.fill();

  // T-shirt
  ctx.fillStyle='#f0f0f0';
  ctx.beginPath();
  ctx.moveTo(cx-s*0.22,cy-s*0.08);ctx.lineTo(cx+s*0.22,cy-s*0.08);
  ctx.lineTo(cx+s*0.19,cy-s*0.62);ctx.lineTo(cx-s*0.19,cy-s*0.62);
  ctx.closePath();ctx.fill();
  // Sleeves
  [[cx-s*0.19,cx-s*0.33],[cx+s*0.19,cx+s*0.33]].forEach(([ix,ox])=>{
    ctx.fillStyle='#f0f0f0';
    ctx.beginPath();
    ctx.moveTo(ix,cy-s*0.60);ctx.lineTo(ix,cy-s*0.40);
    ctx.lineTo(ox,cy-s*0.38);ctx.lineTo(ox,cy-s*0.57);
    ctx.closePath();ctx.fill();
  });

  // Arms
  ctx.strokeStyle='#e8a882'; ctx.lineWidth=s*0.11;
  ctx.beginPath();ctx.moveTo(cx-s*0.26,cy-s*0.45);
  ctx.quadraticCurveTo(cx-s*0.34,cy-s*0.28+s*0.10*swing,cx-s*0.30+s*0.08*swing,cy-s*0.06+s*0.05*swing);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+s*0.26,cy-s*0.45);
  ctx.quadraticCurveTo(cx+s*0.34,cy-s*0.28-s*0.10*swing,cx+s*0.30-s*0.08*swing,cy-s*0.06-s*0.05*swing);ctx.stroke();
  ctx.fillStyle='#e8a882';
  ctx.beginPath();ctx.arc(cx-s*0.30+s*0.08*swing,cy-s*0.06+s*0.05*swing,s*0.065,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+s*0.30-s*0.08*swing,cy-s*0.06-s*0.05*swing,s*0.065,0,Math.PI*2);ctx.fill();

  // Neck + head
  const hcy=cy-s*0.84;
  ctx.fillStyle='#e8a882';
  ctx.beginPath();ctx.ellipse(cx,cy-s*0.63,s*0.075,s*0.065,0,0,Math.PI*2);ctx.fill();
  ctx.fillRect(cx-s*0.075,cy-s*0.68,s*0.15,s*0.08);
  ctx.beginPath();ctx.ellipse(cx,hcy,s*0.195,s*0.215,0,0,Math.PI*2);ctx.fill();
  // Ears
  ctx.fillStyle='#d4906a';
  ctx.beginPath();ctx.ellipse(cx-s*0.20,hcy+s*0.02,s*0.055,s*0.08,0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+s*0.20,hcy+s*0.02,s*0.055,s*0.08,-0.2,0,Math.PI*2);ctx.fill();
  // Nuque
  ctx.fillStyle='#e8a882';
  ctx.beginPath();ctx.ellipse(cx,cy-s*0.66,s*0.12,s*0.08,0,0,Math.PI);ctx.fill();
  // Hair
  if(!isFinite(cx)||!isFinite(cy)||isNaN(s)||s<=0) return;
  const hairG=ctx.createRadialGradient(cx,hcy-s*0.05,0,cx,hcy,s*0.22);
  hairG.addColorStop(0,'#5a3a20');hairG.addColorStop(1,'#2a1808');
  ctx.fillStyle=hairG;
  ctx.beginPath();ctx.arc(cx,hcy-s*0.05,s*0.18,Math.PI+0.45,-0.45);ctx.fill();

  // Pulse ring
  ctx.strokeStyle=`rgba(26,115,232,${0.15+0.07*Math.sin(pulse)})`;
  ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy-s*0.3,s*0.35+2*Math.sin(pulse),0,Math.PI*2);ctx.stroke();
}

function rrFill(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();c.fill();
}

function updateEta(){

}

// Drag / molette : fait défiler la VUE uniquement (viewCenterWeek).
// Le bonhomme (camDay) ne bouge jamais ici, seulement via les flèches / lecture auto.
canvas.style.cursor='ns-resize';

// === SCROLL TACTILE via Pointer Events ===
let pStartY=null, pViewStart=0, pVY=0, pLastY=null, pLastT=null;
const VIEW_MIN_WEEK=0, VIEW_MAX_WEEK=TOTAL_DAYS/7;
function clampView(w){ return Math.max(VIEW_MIN_WEEK,Math.min(VIEW_MAX_WEEK,w)); }

wrap.style.touchAction='none';
wrap.addEventListener('pointerdown',e=>{
  if(e.target.closest('button')||e.target.closest('input')) return;
  pStartY=e.clientY; pViewStart=viewCenterWeek;
  pLastY=e.clientY; pLastT=Date.now(); pVY=0;
  wrap.setPointerCapture(e.pointerId);
  e.preventDefault();
},{passive:false});

wrap.addEventListener('pointermove',e=>{
  if(pStartY===null) return;
  const now=Date.now(), dt2=Math.max(1,now-pLastT);
  pVY=(e.clientY-pLastY)/dt2*16;
  pLastY=e.clientY; pLastT=now;
  // Scroll pixel par pixel — la vue monte ou descend, le bonhomme ne bouge pas
  const dy2=e.clientY-pStartY;
  const lh2=laneH()||90;
  viewCenterWeek=clampView(pViewStart - dy2/lh2);
  e.preventDefault();
},{passive:false});

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const lh2=laneH()||90;
  viewCenterWeek=clampView(viewCenterWeek + e.deltaY/lh2);
},{passive:false});

wrap.addEventListener('pointerup',e=>{
  if(pStartY===null) return;
  pStartY=null;
  // Momentum : continue de faire défiler la vue après le relâchement
  let vyM=pVY;
  function doMomentum(){
    if(Math.abs(vyM)<0.5) return;
    const lh2=laneH()||90;
    viewCenterWeek=clampView(viewCenterWeek - vyM/lh2);
    vyM*=0.90;
    requestAnimationFrame(doMomentum);
  }
  doMomentum();
});
wrap.addEventListener('pointercancel',()=>{pStartY=null;});


// Boutons navigation (flèches) — déplacent le bonhomme (camDay), et la vue le suit
let navIv=null;

window.syncAllCalendars = async function syncAllCalendars(){
  const btn = document.getElementById('syncbtn');
  btn.style.color='#fbbc04';
  btn.style.animation='spin 1s linear infinite';
  const APPS_SCRIPT_URL='https://raw.githubusercontent.com/jfesteoule/agenda-jf/main/events.json';
  try {
    const resp = await fetch(APPS_SCRIPT_URL);
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const events = await resp.json();
    const ORIGIN = new Date('2023-01-01T00:00:00Z');
    EVT_JF.length=0; EVT_ANNE.length=0;
    events.forEach(ev=>{
      const d=new Date(ORIGIN.getTime()+ev.day*86400000);
      const label=d.getDate()+' '+d.toLocaleString('fr-FR',{month:'short'});
      const item={day:ev.day,label,title:(ev.title||'').slice(0,40),color:ev.side==='right'?'#1a73e8':'#e67c73',side:ev.side,who:ev.who};
      if(ev.side==='right') EVT_JF.push(item); else EVT_ANNE.push(item);
    });
    ALL_EVENTS.length=0;
    [...EVT_JF,...EVT_ANNE].sort((a,b)=>a.day-b.day).forEach(e=>ALL_EVENTS.push(e));
    btn.style.color='#34a853'; btn.style.animation='';
    alert('✓ '+events.length+' événements synchronisés !');
  } catch(err) {
    btn.style.color='#ea4335'; btn.style.animation='';
    alert('Erreur sync: '+err.message);
  }
};
document.getElementById('syncbtn').addEventListener('click', window.syncAllCalendars);
window.syncAllCalendars = syncAllCalendars;

// ===== ASCENSEUR =====
const scrollbarEl = document.getElementById('scrollbar');
const thumbEl = document.getElementById('scrollthumb');

const SCROLL_WEEKS = TOTAL_DAYS/7; // nombre total de semaines

function updateScrollbar(){
  const trackH = scrollbarEl.clientHeight;
  const viewWeekNow = Math.floor(viewCenterWeek);
  // Thumb height = proportion visible / total
  const visibleWeeks = Math.max(3, Math.ceil(H/laneH()));
  const thumbH = Math.max(30, trackH * visibleWeeks / SCROLL_WEEKS);
  // Thumb position
  const scrollFrac = 1 - viewWeekNow / SCROLL_WEEKS; // inversé: haut=futur, bas=passé
  const thumbTop = scrollFrac * (trackH - thumbH);
  thumbEl.style.height = thumbH + 'px';
  thumbEl.style.top = thumbTop + 'px';
}

// Drag thumb — fait défiler la vue (comme le doigt sur l'écran), le bonhomme ne bouge pas
let thumbDrag = false, thumbStartY = 0, thumbStartView = 0;
thumbEl.addEventListener('pointerdown', e=>{
  thumbDrag = true;
  thumbStartY = e.clientY;
  thumbStartView = viewCenterWeek;
  thumbEl.setPointerCapture(e.pointerId);
  e.stopPropagation();
  e.preventDefault();
},{passive:false});

document.addEventListener('pointermove', e=>{
  if(!thumbDrag) return;
  const trackH = scrollbarEl.clientHeight;
  const visibleWeeks = Math.max(3, Math.ceil(H/laneH()));
  const thumbH = Math.max(30, trackH * visibleWeeks / SCROLL_WEEKS);
  const dy = e.clientY - thumbStartY;
  const dWeeks = -dy / (trackH - thumbH) * (SCROLL_WEEKS - visibleWeeks); // inversé
  viewCenterWeek = clampView(thumbStartView + dWeeks);
  e.preventDefault();
},{passive:false});

document.addEventListener('pointerup', e=>{
  thumbDrag = false;
});

// Click on track to jump
scrollbarEl.addEventListener('click', e=>{
  if(e.target===thumbEl) return;
  const rect = scrollbarEl.getBoundingClientRect();
  const frac = 1 - (e.clientY - rect.top) / scrollbarEl.clientHeight; // inversé
  viewCenterWeek = clampView(frac * SCROLL_WEEKS);
});

// Update scrollbar in draw loop
